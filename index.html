<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent LATAM</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f1118'/><rect x='13' y='4' width='6' height='12' rx='3' fill='%2310b981'/><path d='M8 15a8 8 0 0 0 16 0' stroke='%2310b981' stroke-width='2' fill='none' stroke-linecap='round'/><line x1='16' y1='23' x2='16' y2='28' stroke='%2310b981' stroke-width='2' stroke-linecap='round'/><line x1='11' y1='28' x2='21' y2='28' stroke='%2310b981' stroke-width='2' stroke-linecap='round'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07090f;
  --surface:   #0f1118;
  --surface2:  #161a26;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --text:      #e2e8f0;
  --muted:     #64748b;
  --accent-a:  #6366f1;  /* indigo — Speaker A */
  --accent-b:  #10b981;  /* emerald — Speaker B */
  --accent-ag: #f59e0b;  /* amber — Agent/system */
  --danger:    #ef4444;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 1fr;
}

/* ─── Header ─────────────────────────────────── */
header {
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.logo-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent-b);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  50%      { box-shadow: 0 0 0 5px rgba(16,185,129,0.2); }
}

.status-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  color: var(--muted);
  transition: all 0.3s;
}

.status-pill.listening { color: var(--accent-b); border-color: rgba(16,185,129,0.3); }
.status-pill.translating { color: var(--accent-ag); border-color: rgba(245,158,11,0.3); }
.status-pill.error { color: var(--danger); border-color: rgba(239,68,68,0.3); }

/* ─── Main layout ────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 320px 1fr;
  overflow: hidden;
  height: calc(100vh - 120px);
}

/* ─── Sidebar ────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  overflow-y: auto;
}

.sidebar-section { display: flex; flex-direction: column; gap: 0.75rem; }

.section-title {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.lang-pair {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  align-items: center;
}

.lang-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  padding: 8px 10px;
  cursor: pointer;
  outline: none;
  width: 100%;
}

.lang-select:focus { border-color: var(--accent-a); }
.lang-select option { background: #1e2130; }

.swap-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.swap-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }

/* ─── Connection button ─────────────────────── */
.connect-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--accent-a);
  color: white;
}

.connect-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.connect-btn.connected { background: var(--danger); }

/* ─── Waveform ──────────────────────────────── */
.waveform-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  overflow: hidden;
}

.wave-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--accent-b);
  height: 4px;
  transition: height 0.05s ease;
  opacity: 0.7;
}

/* ─── Stat cards ────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.stat-value {
  font-size: 20px;
  font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text);
  line-height: 1;
}

.stat-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ─── Action buttons ────────────────────────── */
.action-row { display: flex; flex-direction: column; gap: 6px; }

.action-btn {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
}

.action-btn:hover { color: var(--text); background: var(--surface2); }

/* ─── Conversation panel ────────────────────── */
.conversation-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.conv-header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.conv-title { font-size: 13px; font-weight: 500; color: var(--muted); }

.conv-stream {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  scroll-behavior: smooth;
}

.conv-stream::-webkit-scrollbar { width: 4px; }
.conv-stream::-webkit-scrollbar-track { background: transparent; }
.conv-stream::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ─── Empty state ───────────────────────────── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  color: var(--muted);
  text-align: center;
  padding: 3rem;
}

.empty-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 0.5rem;
}

.empty-state p { font-size: 13px; line-height: 1.6; max-width: 260px; }

/* ─── Message bubbles ───────────────────────── */
.msg {
  display: flex;
  flex-direction: column;
  gap: 6px;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-meta {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.msg-meta .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

.msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 680px;
  border-left: 3px solid transparent;
}

.msg.speaker-a .msg-bubble   { border-left-color: var(--accent-a); }
.msg.speaker-b .msg-bubble   { border-left-color: var(--accent-b); }
.msg.system    .msg-bubble   { border-left-color: var(--accent-ag); color: var(--muted); font-size: 12px; }
.msg.interim   .msg-bubble   { border-left-color: var(--muted); opacity: 0.5; font-style: italic; }

.msg.speaker-a .dot { background: var(--accent-a); }
.msg.speaker-b .dot { background: var(--accent-b); }
.msg.system    .dot { background: var(--accent-ag); }

.msg-translation {
  font-size: 13px;
  color: var(--muted);
  padding: 4px 16px;
  border-left: 3px solid var(--border2);
  margin-left: 2px;
  font-style: italic;
}

.cultural-note {
  font-size: 11px;
  color: var(--accent-ag);
  background: rgba(245,158,11,0.06);
  border-radius: 6px;
  padding: 5px 10px;
  margin-top: 2px;
}

.register-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  margin-left: 4px;
}

/* ─── Interim live caption bar ──────────────── */
.caption-bar {
  padding: 10px 1.5rem;
  border-top: 1px solid var(--border);
  min-height: 42px;
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
}

.caption-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-b);
  flex-shrink: 0;
  animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

/* ─── Responsive ────────────────────────────── */
@media (max-width: 700px) {
  main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 280px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Voice Agent LATAM
  </div>
  <div class="status-pill" id="status-pill">Disconnected</div>
</header>

<main>
  <!-- ─── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="section-title">Language pair</div>
      <div class="lang-pair">
        <select class="lang-select" id="lang-a">
          <option value="es-419">Spanish (LATAM)</option>
          <option value="es-AR">Spanish (Argentina)</option>
          <option value="es-CO">Spanish (Colombia)</option>
          <option value="es-CL">Spanish (Chile)</option>
          <option value="es-PE">Spanish (Peru)</option>
          <option value="es-MX">Spanish (Mexico)</option>
          <option value="pt-BR">Portuguese (Brazil)</option>
          <option value="en-US">English (US)</option>
          <option value="de-DE">German</option>
        </select>
        <button class="swap-btn" id="swap-btn" title="Swap languages">⇄</button>
        <select class="lang-select" id="lang-b">
          <option value="en-US">English (US)</option>
          <option value="es-419">Spanish (LATAM)</option>
          <option value="es-AR">Spanish (Argentina)</option>
          <option value="es-CO">Spanish (Colombia)</option>
          <option value="pt-BR">Portuguese (Brazil)</option>
          <option value="de-DE">German</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="connect-btn" id="connect-btn">Connect &amp; start listening</button>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Mode</div>
      <select class="lang-select" id="mode-select">
        <option value="translate">Translate — render speech in target language</option>
        <option value="converse">Converse — AI responds in target language</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Live audio input</div>
      <div class="waveform-wrap" id="waveform">
        <div style="color: var(--muted); font-size:12px;">Connect to see waveform</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Session stats</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-turns">0</div>
          <div class="stat-label">Turns</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-latency">—</div>
          <div class="stat-label">Avg latency</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-words">0</div>
          <div class="stat-label">Words</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-notes">0</div>
          <div class="stat-label">Cultural notes</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Actions</div>
      <div class="action-row">
        <button class="action-btn" id="clear-btn">Clear conversation</button>
        <button class="action-btn" id="export-btn">Export transcript</button>
      </div>
    </div>

    <div class="sidebar-section" style="margin-top: auto;">
      <div class="section-title">Use case</div>
      <select class="lang-select" id="use-case">
        <option value="interpreter">Live interpreter (same room)</option>
        <option value="remote">Remote call / video conference</option>
        <option value="support">Customer support agent</option>
      </select>
    </div>

  </aside>

  <!-- ─── Conversation panel ────────────────────────── -->
  <div class="conversation-panel">
    <div class="conv-header">
      <div class="conv-title">Conversation</div>
    </div>

    <div class="conv-stream" id="conv-stream">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌎</div>
        <p>Select your language pair and press connect.<br>Speaking will be detected automatically.</p>
      </div>
    </div>

    <div class="caption-bar" id="caption-bar" style="display:none;">
      <div class="caption-dot"></div>
      <span id="caption-text">Listening...</span>
    </div>
  </div>
</main>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let ws           = null;
let audioCtx     = null;   // 16kHz AudioContext for mic capture + waveform
let micStream    = null;   // raw MediaStream (for track cleanup)
let micProcessor = null;   // ScriptProcessor for PCM capture
let analyser     = null;
let waveAnimId   = null;
let audioChunks   = [];
let sessionId     = null;
let connected     = false;

let stats = { turns: 0, latencies: [], words: 0, culturalNotes: 0 };
let turnStart = 0;
let transcript = [];

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const connectBtn  = document.getElementById('connect-btn');
const swapBtn     = document.getElementById('swap-btn');
const statusPill  = document.getElementById('status-pill');
const convStream  = document.getElementById('conv-stream');
const captionBar  = document.getElementById('caption-bar');
const captionText = document.getElementById('caption-text');
const waveformEl  = document.getElementById('waveform');

// ─── Connect / disconnect ──────────────────────────────────────────────────────
connectBtn.addEventListener('click', () => {
  connected ? disconnect() : connect();
});

async function connect() {
  try {
    // Request mic access
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    // 16kHz AudioContext for mic capture + waveform (matches Deepgram linear16 config)
    micStream = stream;
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

    // Capture raw linear16 PCM via ScriptProcessor and stream to server.
    // MediaRecorder sends fragmented WebM — only the first chunk has the
    // container header, so Deepgram can't decode subsequent chunks.
    // Raw PCM bypasses that issue entirely.
    const micSource = audioCtx.createMediaStreamSource(stream);
    micProcessor    = audioCtx.createScriptProcessor(4096, 1, 1);
    micProcessor.onaudioprocess = (e) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const float32 = e.inputBuffer.getChannelData(0);
        const int16   = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
        }
        ws.send(int16.buffer);
      }
    };
    micSource.connect(micProcessor);
    micProcessor.connect(audioCtx.destination);

    // Waveform reuses the same AudioContext
    setupWaveform(stream, audioCtx);

    // Open WebSocket to server
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('Configuring...', '');
      // Send language config
      ws.send(JSON.stringify({
        type:        'config',
        speakerLang: document.getElementById('lang-a').value,
        targetLang:  document.getElementById('lang-b').value,
        mode:        document.getElementById('mode-select').value,
      }));
    };

    ws.onmessage = (event) => handleServerMessage(JSON.parse(event.data));

    ws.onerror = (err) => {
      console.error('WS error', err);
      setStatus('Connection error', 'error');
    };

    ws.onclose = () => {
      setStatus('Disconnected', '');
      stopRecording();
      connected = false;
      connectBtn.textContent = 'Connect & start listening';
      connectBtn.classList.remove('connected');
      captionBar.style.display = 'none';
      cancelAnimationFrame(waveAnimId);
    };

    connected = true;
    connectBtn.textContent = 'Disconnect';
    connectBtn.classList.add('connected');

  } catch (err) {
    setStatus('Mic access denied', 'error');
    console.error(err);
  }
}

function disconnect() {
  if (ws) { ws.send(JSON.stringify({ type: 'stop' })); ws.close(); ws = null; }
  stopRecording();
  connected = false;
  connectBtn.textContent = 'Connect & start listening';
  connectBtn.classList.remove('connected');
  setStatus('Disconnected', '');
  captionBar.style.display = 'none';
  cancelAnimationFrame(waveAnimId);
}

function stopRecording() {
  if (micProcessor) {
    try { micProcessor.disconnect(); } catch (_) {}
    micProcessor = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (audioCtx && audioCtx.state !== 'closed') {
    audioCtx.close();
    audioCtx = null;
  }
}

// ─── Server message handler ────────────────────────────────────────────────────
function handleServerMessage(msg) {
  switch (msg.type) {

    case 'session':
      sessionId = msg.sessionId;
      break;

    case 'ready':
      setStatus('Listening', 'listening');
      captionBar.style.display = 'flex';
      captionText.textContent = 'Waiting for speech...';
      removeEmpty();
      addSystemMsg('Session started. Speak naturally — translation is automatic.');
      break;

    case 'speech_started':
      turnStart = Date.now();
      setStatus('Listening', 'listening');
      captionText.textContent = '...';
      break;

    case 'interim':
      captionText.textContent = msg.text || '...';
      break;

    case 'utterance_complete':
      captionText.textContent = 'Translating...';
      break;

    case 'translating':
      setStatus('Translating', 'translating');
      break;

    case 'translation': {
      const latency = Date.now() - turnStart;
      stats.turns++;
      stats.latencies.push(latency);
      stats.words += (msg.original || '').split(' ').length;
      if (msg.culturalNote) stats.culturalNotes++;
      updateStats();

      addMessage({
        speaker:     'a',
        langLabel:   LANG_DISPLAY[msg.speakerLang] || msg.speakerLang,
        targetLabel: LANG_DISPLAY[msg.targetLang]  || msg.targetLang,
        text:        msg.original,
        translation: msg.translation,
        register:    msg.register,
        culturalNote: msg.culturalNote,
        latencyMs:   latency,
        isReply:     msg.isReply,
      });

      transcript.push({
        time: new Date().toISOString(),
        speaker: msg.speakerLang,
        original: msg.original,
        translation: msg.translation,
      });

      setStatus('Listening', 'listening');
      captionText.textContent = 'Waiting for speech...';
      break;
    }

    case 'tts_start':
      audioChunks = [];
      break;

    case 'tts_chunk':
      audioChunks.push(msg.audio);
      break;

    case 'tts_end': {
      if (audioChunks.length) {
        const binary = audioChunks.map(b64 => atob(b64)).join('');
        const bytes  = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob   = new Blob([bytes], { type: 'audio/mpeg' });
        const url    = URL.createObjectURL(blob);
        const audio  = new Audio(url);
        audio.onended = () => URL.revokeObjectURL(url);
        audio.onerror = (e) => console.error('Audio playback error:', e);
        audio.play().catch(e => console.error('Play failed:', e));
      }
      audioChunks = [];
      break;
    }

    case 'tts_fallback':
      // ElevenLabs unavailable — use browser speechSynthesis
      speakFallback(msg.text, msg.lang);
      break;

    case 'swapped':
      addSystemMsg(`Languages swapped: ${LANG_DISPLAY[msg.speakerLang] || msg.speakerLang} ↔ ${LANG_DISPLAY[msg.targetLang] || msg.targetLang}`);
      break;

    case 'history_cleared':
      addSystemMsg('Conversation history cleared.');
      break;

    case 'error':
      setStatus('Error', 'error');
      addSystemMsg('Error: ' + msg.message, true);
      break;
  }
}

// ─── Audio playback ────────────────────────────────────────────────────────────
// ─── Fallback TTS via browser speechSynthesis ─────────────────────────────────
function speakFallback(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel(); // stop any in-progress speech
  const utt  = new SpeechSynthesisUtterance(text);
  utt.lang   = lang || 'es-419';
  utt.rate   = 0.95;
  utt.pitch  = 1;
  window.speechSynthesis.speak(utt);
}

// ─── Waveform ──────────────────────────────────────────────────────────────────
function setupWaveform(stream, ctx) {
  analyser = ctx.createAnalyser();
  analyser.fftSize = 64;
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  waveformEl.innerHTML = '';
  const bars = [];
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    waveformEl.appendChild(b);
    bars.push(b);
  }

  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    waveAnimId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    bars.forEach((b, i) => {
      const v = (data[i] || 0) / 255;
      b.style.height = Math.max(4, v * 48) + 'px';
    });
  }
  draw();
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function setStatus(text, cls) {
  statusPill.textContent = text;
  statusPill.className   = 'status-pill' + (cls ? ' ' + cls : '');
}

function removeEmpty() {
  const e = document.getElementById('empty-state');
  if (e) e.remove();
}

function addSystemMsg(text, isError) {
  removeEmpty();
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `
    <div class="msg-meta">
      <div class="dot" style="background: ${isError ? 'var(--danger)' : 'var(--accent-ag)'}"></div>
      System
    </div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  convStream.appendChild(div);
  convStream.scrollTop = convStream.scrollHeight;
}

function addMessage({ speaker, langLabel, targetLabel, text, translation, register, culturalNote, latencyMs, isReply }) {
  const div = document.createElement('div');
  div.className = `msg speaker-${speaker}`;

  const latStr = latencyMs ? `${latencyMs}ms` : '';
  const regBadge = (!isReply && register) ? `<span class="register-badge">${register}</span>` : '';

  const translationHtml = isReply && translation
    ? `<div class="msg-translation" style="font-style:normal;font-weight:500;font-size:15px;color:var(--fg);margin-top:6px">${escHtml(targetLabel || '')}: ${escHtml(translation)}</div>`
    : translation
      ? `<div class="msg-translation">→ ${escHtml(translation)}</div>`
      : '';

  div.innerHTML = `
    <div class="msg-meta">
      <div class="dot"></div>
      ${escHtml(langLabel)} ${latStr ? `· <span style="color:var(--muted)">${latStr}</span>` : ''} ${regBadge}
    </div>
    <div class="msg-bubble"${isReply ? ' style="color:var(--muted);font-size:13px"' : ''}>${escHtml(text)}</div>
    ${translationHtml}
    ${culturalNote ? `<div class="cultural-note">💡 ${escHtml(culturalNote)}</div>` : ''}
  `;
  convStream.appendChild(div);
  convStream.scrollTop = convStream.scrollHeight;
}

function updateStats() {
  document.getElementById('stat-turns').textContent   = stats.turns;
  document.getElementById('stat-words').textContent   = stats.words;
  document.getElementById('stat-notes').textContent   = stats.culturalNotes;
  if (stats.latencies.length) {
    const avg = Math.round(stats.latencies.reduce((a,b)=>a+b,0) / stats.latencies.length);
    document.getElementById('stat-latency').textContent = avg + 'ms';
  }
}

// ─── Swap languages ────────────────────────────────────────────────────────────
swapBtn.addEventListener('click', () => {
  const selA = document.getElementById('lang-a');
  const selB = document.getElementById('lang-b');
  const tmp  = selA.value;
  selA.value = selB.value;
  selB.value = tmp;

  if (connected && ws) {
    ws.send(JSON.stringify({ type: 'swap' }));
  }
});

// ─── Clear conversation ────────────────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  convStream.innerHTML = '';
  transcript = [];
  stats = { turns:0, latencies:[], words:0, culturalNotes:0 };
  updateStats();
  if (connected && ws) ws.send(JSON.stringify({ type: 'clear_history' }));
  addSystemMsg('Conversation cleared.');
});

// ─── Export transcript ─────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  if (!transcript.length) { alert('No conversation to export yet.'); return; }

  const lines = transcript.map(t =>
    `[${t.time}] ${t.speaker}\nOriginal: ${t.original}\nTranslated: ${t.translation}\n`
  ).join('\n');

  const blob = new Blob([lines], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `voice-agent-transcript-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
